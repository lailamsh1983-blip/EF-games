<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحث بصري تفاعلي</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('background.jpg'); /* صورة الخلفية */
            background-size: cover;
            text-align: center;
        }
        #gameContainer {
            position: relative;
            width: 80%;
            margin: auto;
            border: 2px solid #000;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8);
        }
        .hidden-shape {
            width: 50px;
            height: 50px;
            position: absolute;
            cursor: pointer;
        }
        #score, #timer {
            font-size: 24px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>لعبة البحث البصري</h1>
    <div id="gameContainer">
        <div id="score">النتيجة: 0</div>
        <div id="timer">الوقت المتبقي: 60</div>
        <div class="hidden-shape" style="top: 20%; left: 30%;" onclick="shapeClicked(this)">🔺</div>
        <div class="hidden-shape" style="top: 50%; left: 70%;" onclick="shapeClicked(this)">🔵</div>
        <div class="hidden-shape" style="top: 80%; left: 40%;" onclick="shapeClicked(this)">⭐</div>
        <p>ابحث عن الأشكال المخفية في الصورة.</p>
    </div>
    <script>
        let score = 0;
        let timeLeft = 60;
        const timerElement = document.getElementById('timer');
        const scoreElement = document.getElementById('score');

        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.textContent = `الوقت المتبقي: ${timeLeft}`;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                alert(`انتهى الوقت! نتيجتك النهائية: ${score}`);
            }
        }, 1000);

        function shapeClicked(shape) {
            score++;
            scoreElement.textContent = `النتيجة: ${score}`;
            shape.style.display = 'none'; // أخف الشكل بعد النقر عليه
        }
    </script>
</body>
</html>
